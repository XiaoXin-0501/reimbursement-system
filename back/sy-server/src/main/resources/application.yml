# 服务器配置
server:
  port: 8080  # 项目启动端口
  tomcat:
    max-http-form-post-size: 1000MB
# 数据库配置（适配Spring Boot3.x + MySQL8.0）
spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-request-size: 1000MB
      max-file-size: 1000MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver  # 驱动类名不变，但依赖坐标已改
    url: jdbc:mysql://localhost:3306/shengyi?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: root  # 你的MySQL用户名
    password:   # 你的MySQL密码
  data:
    # redis 配置
    redis:
      # 地址
      host:
      # 端口，默认为6379
      port: 6379
      # 数据库索引
      database: 1
      # 密码
      password:
      # 连接超时时间
      timeout: 10s
  #      lettuce:
  #        pool:
  #          # 连接池中的最小空闲连接
  #          min-idle: 0
  #          # 连接池中的最大空闲连接
  #          max-idle: 8
  #          # 连接池的最大数据库连接数
  #          max-active: 8
  #          # #连接池最大阻塞等待时间（使用负值表示没有限制）
  #          max-wait: -1ms


#  Mybatis-Plus配置（适配Spring Boot3.x）
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.vetech.study.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false